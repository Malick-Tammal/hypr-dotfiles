#----------------------------------------------------------
#--  HACK: Keybinds
#----------------------------------------------------------

#  INFO: Remaping leader key
unbind C-b
set -g prefix `
bind ` send-prefix

#  INFO: Windows

unbind n
bind n new-window -c "#{pane_current_path}" # New window
bind w list-windows # List windows
bind x kill-pane # Kill window / pane
bind r command-prompt "rename-window %%" # Rename window

#  TIP: Window navigation
bind -n M-h previous-window
bind -n M-l next-window
bind L last-window

#  TIP: Window split 
bind v split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

#  TIP: Window resize 
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r L resize-pane -R 5

#  INFO: Sessions

bind d detach # Detach session
bind * list-clients # List sessions

#  INFO: Reload tmux config 
bind R source-file ~/.config/tmux/tmux.conf \; display "🔃 Reloaded!"

#  INFO: VIM

set-window-option -g mode-keys vi # VIM mode

unbind [
bind Escape copy-mode # Enter Copy mode

bind-key -T copy-mode-vi v send-keys -X begin-selection # Enter Visual mode
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle # Enter Visual block mode
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel # Copy selection
