#----------------------------------------------------------
#--  HACK: Hypridle
#----------------------------------------------------------

general {
    lock_cmd = qs ipc call lockscreen lock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch "hl.dsp.dpms({ action = 'enable' })" 
    inhibit_sleep = 3
    ignore_dbus_inhibit = false
}

#  INFO: PRE-IDLE: Dim the screen (after 10 minutes)
listener {
    timeout = 600
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

#  INFO: LOCK: Lock the screen (after 15 minutes)
listener {
    timeout = 900
    on-timeout = loginctl lock-session
}

#  INFO: DPMS: Turn off screen (after 16 minutes)
listener {
    timeout = 960
    on-timeout = hyprctl dispatch "hl.dsp.dpms({ action = 'enable' })"
    on-resume = hyprctl dispatch "hl.dsp.dpms({ action = 'disable' })"
}

#  INFO: SUSPEND: Deep sleep (after 30 minutes)
listener {
    timeout = 1800
    on-timeout = systemctl suspend
    on-resume = swaync-client -R && swaync-client -rs
}
