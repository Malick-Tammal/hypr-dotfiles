# Pipes ╰─ ╭─
# Powerline symbols                                     
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   
# Replace the "❯" symbol in the prompt with "➜"

add_newline = true

format = """
 $os 󰜥 $directory $git_branch$nodejs
 $character
"""

right_format = """
 $cmd_duration $time
"""

[character]
success_symbol = "[  ╰─ ](bold fg:cyan)"
error_symbol = "[   ](bold fg:red)"

[package]
disabled = true

[git_branch]
style = "bg: #AB9DF2"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = " [](bold fg:#AB9DF2)[$symbol $branch(:$remote_branch)](bold fg:#2A234E bg:#AB9DF2)[ ](bold fg:#AB9DF2)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "
disabled = true

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " s ‍"
stashed = " 📦 "
modified = "  "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "
format = "[](bold fg:#AB9DF2)[$all_status$ahead_behind](fg:#2A234E bg:#AB9DF2)[](bold fg:#AB9DF2)"
disabled = true

[hostname]
ssh_only = false
format = "[•$hostname](bg:cyan bold fg:black)[](bold fg:cyan)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = false
format = "[](bold fg:#FFD866)[ $time ](fg:#FFD866)[](bold fg:#FFD866)"
time_format = "%R"

[username]
style_user = "bold bg:cyan fg:black"
style_root = "red bold"
format = "[](bold fg:cyan)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "  "
read_only = "  "
style = "bg:#A9DC76 fg:#222C18"
truncation_length = 6
truncation_symbol = " ••/"
format = '[](bold fg:green)[󰉋 $path]($style bold)[](bold fg:green)'

[directory.substitutions]
"Desktop" = " 󰇄 "
"Documents" = "  "
"Downloads" = "  "
"Music" = "  "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "
"dotfiles" = "  dots"
".config" = "  "
"Projects" = " 󰅨 "
"Data" = "  "

[cmd_duration]
min_time = 1_0
show_milliseconds = true
format = '[](bold fg:#78DCE8)[ $duration](bold bg:#78DCE8 fg:#182C2E)[](bold fg:#78DCE8)'

[os]
disabled = false
format = '[](bold fg:yellow)[$symbol](bold bg:yellow fg:#332B14)[](bold fg:yellow)'

[os.symbols]
Alpaquita = " "
Alpine = " "
AlmaLinux = " "
Amazon = " "
Android = " "
Arch = " "
Artix = " "
CentOS = " "
Debian = " "
Fedora = " "
FreeBSD = " "
Gentoo = " "
Linux = " "
Macos = " "
Manjaro = " "
NixOS = " "
openSUSE = " "
Raspbian = " "
Ubuntu = " "
Windows = "󰍲 "

[nodejs]
format = '➜ [](bold fg:#FD9B6B)[ $version](bold bg:#FD9B6B fg:#321E15)[](bold fg:#FD9B6B)'
