# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols В оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’ 
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—
# Cool stuff у°ңҘ о©ұ пҒӢ пҖҚ
# Replace the "вқҜ" symbol in the prompt with "вһң"

add_newline = true

format = """
 $os у°ңҘ $directory $git_branch$nodejs
 $character
"""

right_format = """
 $cmd_duration $time
"""

[character]
success_symbol = "[  в•°в”Җ пҒӢ](bold fg:cyan)"
error_symbol = "[  пҖҚ пҒӢ](bold fg:red)"

[package]
disabled = true

[git_branch]
style = "bg: #AB9DF2"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = "о©ұ [оӮ¶](bold fg:#AB9DF2)[$symbol $branch(:$remote_branch)](bold fg:#2A234E bg:#AB9DF2)[оӮҙ ](bold fg:#AB9DF2)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "
disabled = true

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " s вҖҚ"
stashed = " рҹ“Ұ "
modified = " пҒҹ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "
format = "[оӮ¶](bold fg:#AB9DF2)[$all_status$ahead_behind](fg:#2A234E bg:#AB9DF2)[оӮҙ](bold fg:#AB9DF2)"
disabled = true

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:cyan bold fg:black)[оӮҙ](bold fg:cyan)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = false
format = "[оӮ·](bold fg:#FFD866)[ $time ](fg:#FFD866)[оӮө](bold fg:#FFD866)"
time_format = "%R"

[username]
style_user = "bold bg:cyan fg:black"
style_root = "red bold"
format = "[оӮ¶](bold fg:cyan)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " пҖ• "
read_only = " пҖЈ "
style = "bg:#A9DC76 fg:#222C18"
truncation_length = 6
truncation_symbol = " вҖўвҖў/"
format = '[оӮ¶](bold fg:green)[у°үӢ $path]($style bold)[оӮҙ](bold fg:green)'

